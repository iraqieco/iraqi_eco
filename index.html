<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عراقي إيكو</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .admin-box { background: #f0f0f0; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; }
        button { background: blue; color: white; border: none; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .card { border: 1px solid #ccc; padding: 10px; }
        .card img { width: 100%; height: 100px; object-fit: cover; }
    </style>
</head>
<body>

    <div class="admin-box">
        <input type="text" id="aName" placeholder="الاسم العربي">
        <input type="text" id="lName" placeholder="الاسم اللاتيني">
        <input type="text" id="iUrl" placeholder="رابط الصورة">
        <select id="cat">
            <option value="ثدييات">ثدييات</option>
            <option value="طيور">طيور</option>
        </select>
        <button id="pubBtn">نشر الكائن</button>
    </div>

    <div id="container" class="grid"></div>

    <script>
        const supabase = supabase.createClient('https://rmqtopxawrrgntcqqnpa.supabase.co', 'Sb_publishable_M1Adw5Xf9Sq-aCSREHP6uQ_5Geps_QX');

        // ربط الزر عن طريق ID وليس onclick
        document.getElementById('pubBtn').addEventListener('click', async () => {
            const arName = document.getElementById('aName').value;
            const lName = document.getElementById('lName').value;
            const iUrl = document.getElementById('iUrl').value;
            const cat = document.getElementById('cat').value;

            const { error } = await supabase.from('species').insert([{
                arabic_name: arName,
                latin_name: lName,
                image_url: iUrl,
                category: cat
            }]);

            if (error) {
                alert("خطأ: " + error.message);
            } else {
                alert("تم النشر!");
                location.reload();
            }
        });

        async function load() {
            const { data } = await supabase.from('species').select('*');
            if (data) {
                document.getElementById('container').innerHTML = data.map(item => `
                    <div class="card">
                        <img src="${item.image_url}">
                        <h3>${item.arabic_name}</h3>
                    </div>
                `).join('');
            }
        }
        load();
    </script>
</body>
</html>
