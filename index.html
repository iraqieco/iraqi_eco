<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عراقي إيكو</title>
    <!-- استدعاء مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; direction: rtl; }
        .card { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>قائمة الكائنات</h1>
    <div id="list">جاري تحميل البيانات...</div>

    <script>
        // إعداد الاتصال باستخدام المفتاح الصحيح الذي أرسلته
        const supabase = window.supabase.createClient(
            'https://rmqtopxawrrgntcqqnpa.supabase.co', 
            'sb_publishable_M1Adw5Xf9Sq-aCSREHP6uQ_5Geps_QX'
        );

        async function getData() {
            try {
                // جلب البيانات من جدول species
                const { data, error } = await supabase.from('species').select('*');
                
                if (error) {
                    document.getElementById('list').innerHTML = "خطأ في جلب البيانات: " + error.message;
                    return;
                }

                if (data.length === 0) {
                    document.getElementById('list').innerHTML = "لا توجد بيانات حالياً.";
                } else {
                    document.getElementById('list').innerHTML = data.map(i => 
                        `<div class="card">${i.name_ar}</div>`
                    ).join('');
                }
            } catch (err) {
                document.getElementById('list').innerHTML = "حدث خطأ غير متوقع: " + err.message;
            }
        }

        getData();
    </script>
</body>
</html>
