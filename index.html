<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="google-site-verification" content="0jRTIrdsb7aj8SvFaH9WswrLn506cgoyudn40MhxDiE" />
    <meta charset="UTF-8">
    <title>عراقي إيكو | مشروع تطوعي يهدف لدراسة وحماية البيئة</title>
    <meta name="description" content="عراقي إيكو: مشروع تطوعي يهدف لدراسة وحماية التنوع الإحيائي و البيئة في العراق، مع تطلعات عالمية بإذن اللّٰه.">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        header { background: #1b5e20; color: white; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        .container { padding: 10px; }
        .stats-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .stat-item { background: white; padding: 8px 15px; border-radius: 20px; border: 1px solid #1b5e20; font-size: 0.8em; }
        
        .controls-wrapper { background: white; border: 1px solid #ccc; border-radius: 20px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .search-main-row { display: flex; gap: 10px; margin-bottom: 15px; }
        #search { border: 1px solid #ccc; padding: 12px; flex: 1; border-radius: 8px; outline: none; }
        #kingdomSelect { border: 1px solid #ccc; padding: 10px; border-radius: 8px; cursor: pointer; }
        
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .action-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid #1b5e20; background: white; color: #1b5e20; cursor: pointer; font-size: 0.85em; transition: 0.3s; }
        .action-btn.active { background: #1b5e20; color: white; }

        .kingdom-section { margin-bottom: 30px; }
        .kingdom-title { background: #1b5e20; color: white; padding: 5px 15px; border-radius: 5px; margin-bottom: 15px; display: inline-block; font-weight: bold; }
        .count-badge { background: #e8f5e9; color: #1b5e20; padding: 2px 8px; border-radius: 10px; font-size: 0.8em; margin-right: 10px; }
        .cards-wrapper { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { border: 2px solid #1b5e20; padding: 15px; border-radius: 15px; background: white; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card-logo { color: #1b5e20; font-weight: bold; text-align: center; font-size: 0.6em; margin-bottom: 10px; }
        .divider { height: 1px; background-color: #ddd; margin: 0 30px 15px 30px; }
        .card img { width: 100%; height: 140px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; display: block; }
        .common-name { font-size: 0.9em; font-weight: bold; text-align: center; color: #333; margin-top: 5px; }
        .latin-name { font-size: 0.7em; font-style: italic; color: #666; text-align: center; display: block; margin-bottom: 5px; }
        .kingdom-tag { font-size: 0.7em; background: #e8f5e9; color: #1b5e20; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-bottom: 5px; }
        .card-desc { font-size: 0.85em; color: #444; line-height: 1.6; margin-top: 5px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; transition: 0.3s; }
        .card.expanded .card-desc { -webkit-line-clamp: unset; }
        .read-more { color: #1b5e20; font-size: 0.8em; font-weight: bold; cursor: pointer; display: none; margin-top: 5px; text-decoration: underline; }
        .status-badge { display: block; padding: 6px; border-radius: 8px; color: white; text-align: center; font-weight: bold; font-size: 0.7em; margin-top: 10px; }
        .menu-btn { position: absolute; top: 10px; right: 10px; cursor: pointer; font-size: 1.5em; color: #1b5e20; }
        .menu-options { display: none; position: absolute; top: 40px; right: 10px; background: white; border: 2px solid #1b5e20; z-index: 100; padding: 15px; border-radius: 10px; min-width: 120px; }
        .menu-options div { padding: 8px; cursor: pointer; border-bottom: 1px solid #eee; }
        input, select { display: block; width: 95%; margin: 10px 0; padding: 12px; border: 1px solid #ccc; border-radius: 8px; }
        #modal { display: none; position: fixed; top: 5%; right: 10%; width: 80%; background: white; padding: 25px; border: 3px solid #1b5e20; z-index: 1000; border-radius: 15px; max-height: 90vh; overflow-y: auto; }
        .admin-footer { margin-top: 50px; text-align: center; opacity: 0.3; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>عراقي إيكو</h1>
    <p>قاعدة بيانات الكائنات الحية في العراق</p>
</header>

<div class="container">
    <div class="controls-wrapper">
        <div class="search-main-row">
            <select id="kingdomSelect" onchange="render()">
                <option value="الكل">كل الممالك</option>
                <option value="حيوانات">حيوانات</option><option value="طيور">طيور</option><option value="نباتات">نباتات</option>
                <option value="فطريات">فطريات</option><option value="طلائعيات">طلائعيات</option><option value="بدائيات">بدائيات</option>
            </select>
            <input type="text" id="search" placeholder="بحث بالاسم العربي أو اللاتيني..." onkeyup="render()">
        </div>
        <div class="btn-group" id="filterBtns"></div>
    </div>
    
    <div id="statsBar" class="stats-bar"></div>
    <button onclick="openModal()" style="margin:15px 0; padding:12px; width:100%; background:#1b5e20; color:white; border:none; border-radius:8px; font-size:1em; cursor:pointer;">+ إضافة مخلوق</button>
    <div id="content"></div>
</div>

<div id="modal">
    <h3 id="modalTitle">إضافة/تعديل مخلوق</h3>
    <input type="hidden" id="editId">
    <input id="n_ar" placeholder="الاسم العربي (إجباري)" required>
    <input id="n_sci" placeholder="الاسم العلمي (إجباري)" required>
    <select id="kingdom">
        <option value="حيوانات">حيوانات</option><option value="طيور">طيور</option><option value="نباتات">نباتات</option>
        <option value="فطريات">فطريات</option><option value="طلائعيات">طلائعيات</option><option value="بدائيات">بدائيات</option>
    </select>
    <input id="class" placeholder="الطائفة (Class)">
    <input id="img" placeholder="رابط الصورة المباشر">
    <input id="desc" placeholder="الوصف">
    <select id="conservation_status">
        <option value="NE">غير مقيم (NE)</option>
        <option value="DD">بيانات ناقصة (DD)</option>
        <option value="LC">غير مهدد (LC)</option>
        <option value="NT">قريب من التهديد (NT)</option>
        <option value="VU">معرض للخطر (VU)</option>
        <option value="EN">مهدد (EN)</option>
        <option value="CR">خطر أقصى (CR)</option>
        <option value="EW">منقرض في البرية (EW)</option>
        <option value="EX">منقرض (EX)</option>
    </select>
    <button id="saveBtn" onclick="saveItem()" style="background:#1b5e20; color:white; padding:12px; width:100%; border:none; border-radius:8px;">حفظ</button>
    <button onclick="document.getElementById('modal').style.display='none'" style="margin-top:10px; width:100%; padding:10px; border:1px solid #ccc; border-radius:8px;">إغلاق</button>
</div>

<div class="admin-footer" onclick="loginPrompt()">⚙️</div>

<script>
    const client = supabase.createClient('https://rmqtopxawrrgntcqqnpa.supabase.co', 'sb_publishable_M1Adw5Xf9Sq-aCSREHP6uQ_5Geps_QX');
    const clickSound = new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3');
    let species = [];
    let currentKingdom = "الكل";
    let imgFilter = null;
    
    const statusConfig = { 'NE': 'غير مقيم', 'DD': 'بيانات ناقصة', 'LC': 'غير مهدد', 'NT': 'قريب من التهديد', 'VU': 'معرض للخطر', 'EN': 'مهدد', 'CR': 'خطر أقصى', 'EW': 'منقرض في البرية', 'EX': 'منقرض' };
    const statusColors = { 'NE': '#9e9e9e', 'DD': '#607d8b', 'LC': '#4caf50', 'NT': '#ffc107', 'VU': '#ff9800', 'EN': '#f44336', 'CR': '#d32f2f', 'EW': '#795548', 'EX': '#000' };

    function playSound() { clickSound.play().catch(()=>{}); }

    function updateControls() {
        const container = document.getElementById('filterBtns');
        const kingdoms = ["الكل", "حيوانات", "طيور", "نباتات", "فطريات", "طلائعيات", "بدائيات"];
        let html = kingdoms.map(k => `<button class="action-btn ${currentKingdom === k ? 'active' : ''}" onclick="setFilter('${k}', null)">${k}</button>`).join('');
        html += `<button class="action-btn ${imgFilter === true ? 'active' : ''}" onclick="setFilter(null, true)">مع الصور</button>`;
        html += `<button class="action-btn ${imgFilter === false ? 'active' : ''}" onclick="setFilter(null, false)">بدون صور</button>`;
        container.innerHTML = html;
    }

    function setFilter(k, i) {
        playSound();
        if (k) { currentKingdom = k; document.getElementById('kingdomSelect').value = k; }
        if (i !== null) imgFilter = (imgFilter === i) ? null : i;
        render(); updateControls();
    }

    async function init() {
        const { data } = await client.from('species').select('*').limit(10000); 
        species = data || [];
        updateStats();
        updateControls();
        render();
    }

    function updateStats() {
        const counts = {};
        species.forEach(s => counts[s.kingdom] = (counts[s.kingdom] || 0) + 1);
        document.getElementById('statsBar').innerHTML = Object.entries(counts)
            .map(([k, v]) => `<div class="stat-item">${k}: ${v}</div>`).join('');
    }

    function render() {
        const q = document.getElementById('search').value.toLowerCase();
        const selK = document.getElementById('kingdomSelect').value;
        const classes = [...new Set(species.map(i => (i.class && i.class.trim() !== "") ? i.class : "غير محدد"))];
        let htmlOutput = "";
        
        classes.forEach(c => {
            const filteredItems = species.filter(i => {
                const itemClass = (i.class && i.class.trim() !== "") ? i.class : "غير محدد";
                const hasImg = i.image_url && i.image_url.trim() !== "";
                const matchesSearch = (i.name_ar || '').toLowerCase().includes(q) || (i.scientific_name || '').toLowerCase().includes(q);
                const matchesKingdom = (currentKingdom === "الكل" || i.kingdom === currentKingdom) && (selK === "الكل" || i.kingdom === selK);
                const matchesImgFilter = (imgFilter === null || (imgFilter ? hasImg : !hasImg));
                return itemClass === c && matchesSearch && matchesKingdom && matchesImgFilter;
            });

            if (filteredItems.length > 0) {
                htmlOutput += `
                    <div class="kingdom-section">
                        <div class="kingdom-title">${c} <span class="count-badge">${filteredItems.length}</span></div>
                        <div class="cards-wrapper">
                            ${filteredItems.map(item => {
                                const rawStatus = (item.conservation_status || '').trim();
                                const statusText = statusConfig[rawStatus] || rawStatus || 'غير محدد';
                                const statusColor = statusColors[rawStatus] || '#757575';
                                return `
                                <div class="card" id="card-${item.id}">
                                    <div class="menu-btn" onclick="toggleMenu(${item.id})">⋮</div>
                                    <div class="menu-options" id="menu-${item.id}">
                                        <div onclick="toggleMenu(${item.id})">✕ إغلاق</div>
                                        <div onclick="deleteItem(${item.id})">🗑 حذف</div>
                                        <div onclick="openModal(${item.id})">✏ تعديل</div>
                                        <div onclick="downloadCard('card-${item.id}')">⬇ تنزيل</div>
                                    </div>
                                    <div class="card-logo">عراقي إيكو</div>
                                    <div class="divider"></div>
                                    ${item.image_url ? `<img src="${item.image_url}" alt="${item.name_ar}" onerror="this.style.display='none'">` : '<div style="height:140px; background:#eee; display:flex; align-items:center; justify-content:center; margin-bottom:10px;">لا توجد صورة</div>'}
                                    <div class="common-name">${item.name_ar || 'غير محدد'}</div>
                                    <div class="latin-name">${item.scientific_name || 'غير محدد'}</div>
                                    <span class="kingdom-tag">${item.class || 'غير محدد'}</span>
                                    <div class="card-desc" id="desc-${item.id}">${item.description || 'لا يوجد وصف'}</div>
                                    <span class="read-more" id="more-${item.id}" onclick="expandCard(${item.id})">عرض المزيد</span>
                                    <div class="status-badge" style="background:${statusColor}">${statusText}</div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                `;
            }
        });
        document.getElementById('content').innerHTML = htmlOutput;
        species.forEach(item => {
            const desc = document.getElementById('desc-' + item.id);
            const moreBtn = document.getElementById('more-' + item.id);
            if (desc && desc.scrollHeight > desc.clientHeight) moreBtn.style.display = 'inline-block';
        });
    }

    function expandCard(id) {
        playSound();
        const card = document.getElementById('card-' + id);
        const btn = document.getElementById('more-' + id);
        card.classList.toggle('expanded');
        btn.innerText = card.classList.contains('expanded') ? 'عرض أقل' : 'عرض المزيد';
    }

    function toggleMenu(id) { playSound(); const m = document.getElementById('menu-'+id); m.style.display = (m.style.display === 'block') ? 'none' : 'block'; }
    function loginPrompt() { playSound(); const e = prompt("إيميل:"); const p = prompt("كلمة المرور:"); client.auth.signInWithPassword({ email: e, password: p }).then(r => { if(r.error) alert(r.error.message); else location.reload(); }); }
    function openModal(id = null) {
        playSound();
        const modal = document.getElementById('modal');
        const item = species.find(i => i.id === id);
        document.getElementById('editId').value = id || '';
        document.getElementById('n_ar').value = item ? item.name_ar : '';
        document.getElementById('n_sci').value = item ? item.scientific_name : '';
        document.getElementById('img').value = item ? (item.image_url || '') : '';
        document.getElementById('desc').value = item ? (item.description || '') : '';
        document.getElementById('kingdom').value = item ? (item.kingdom || 'حيوانات') : 'حيوانات';
        document.getElementById('class').value = item ? (item.class || '') : '';
        document.getElementById('conservation_status').value = item ? (item.conservation_status || 'NE') : 'NE';
        modal.style.display = 'block';
    }

    async function saveItem() {
        playSound();
        const saveBtn = document.getElementById('saveBtn');
        const n_ar = document.getElementById('n_ar').value;
        const n_sci = document.getElementById('n_sci').value;
        if (!n_ar || !n_sci) return alert("الحقول مطلوبة!");
        saveBtn.innerText = "جاري الحفظ...";
        const data = { name_ar: n_ar, scientific_name: n_sci, description: document.getElementById('desc').value, image_url: document.getElementById('img').value, kingdom: document.getElementById('kingdom').value, class: document.getElementById('class').value, conservation_status: document.getElementById('conservation_status').value };
        const id = document.getElementById('editId').value;
        const res = id ? await client.from('species').update(data).eq('id', id) : await client.from('species').insert([data]);
        if (res.error) alert("خطأ: " + res.error.message); else location.reload();
    }

    async function deleteItem(id) {
        playSound();
        if(confirm('تأكيد الحذف؟')) { await client.from('species').delete().eq('id', id); location.reload(); }
    }

    function downloadCard(id) {
        playSound();
        const card = document.getElementById(id);
        const menu = document.getElementById('menu-' + id.split('-')[1]);
        const btn = document.getElementById('more-' + id.split('-')[1]);
        menu.style.display = 'none'; btn.style.display = 'none';
        html2canvas(card, { useCORS: true }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'creature.png';
            link.href = canvas.toDataURL();
            link.click();
            btn.style.display = 'inline-block';
        });
    }
    init();
</script>
</body>
</html>
