<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عراقي إيكو</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; }
        header { background: #1b5e20; color: white; padding: 20px; text-align: center; }
        .container { padding: 20px; }
        .kingdom-section { margin-top: 30px; border-bottom: 2px solid #1b5e20; padding-bottom: 10px; }
        .card { border: 2px solid #1b5e20; padding: 15px; margin: 10px; border-radius: 10px; background: white; width: 280px; display: inline-block; vertical-align: top; }
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 5px; color: white; font-size: 0.8em; margin-top: 5px; }
        input, select { display: block; width: 90%; margin: 5px 0; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        #modal { display: none; position: fixed; top: 5%; right: 10%; width: 80%; background: white; padding: 20px; border: 3px solid #1b5e20; z-index: 100; border-radius: 10px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

<header>
    <h1>عراقي إيكو</h1>
    <p>قاعدة بيانات الكائنات الحية في العراق</p>
</header>

<div class="container">
    <input type="text" id="search" style="width:100%; padding:12px; margin-bottom:20px;" placeholder="بحث..." onkeyup="render()">
    <button onclick="handleBtnClick()" style="padding: 10px 20px; background: #1b5e20; color: white; border: none; border-radius: 5px; cursor:pointer;">+ إضافة مخلوق</button>
    <div id="content"></div>
</div>

<div id="modal">
    <button onclick="document.getElementById('modal').style.display='none'">✖ إغلاق</button>
    <h3>إضافة مخلوق جديد</h3>
    <input id="n_ar" placeholder="الاسم العربي (إجباري)">
    <input id="n_sci" placeholder="الاسم اللاتيني (إجباري)">
    <input id="kingdom" placeholder="المملكة (اختياري)">
    <select id="status">
        <option value="">حالة الحفظ (اختياري)</option>
        <option value="محمي">محمي</option>
        <option value="مهدد">مهدد بالانقراض</option>
        <option value="غير مهدد">غير مهدد</option>
    </select>
    <input id="img" placeholder="رابط الصورة (اختياري)">
    <input id="desc" placeholder="الوصف (اختياري)">
    <button onclick="addItem()" style="background:#1b5e20; color:white; padding:10px; width:100%; margin-top:10px;">حفظ المخلوق</button>
</div>

<script>
    const client = supabase.createClient('https://rmqtopxawrrgntcqqnpa.supabase.co', 'sb_publishable_M1Adw5Xf9Sq-aCSREHP6uQ_5Geps_QX');
    let species = [];

    async function init() {
        const { data } = await client.from('species').select('*');
        species = data || [];
        render();
    }

    function render() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = species.filter(i => (i.name_ar||'').includes(q) || (i.scientific_name||'').includes(q));
        const kingdoms = [...new Set(filtered.map(i => i.kingdom || 'غير مصنف'))];
        
        document.getElementById('content').innerHTML = kingdoms.map(k => `
            <div class="kingdom-section"><h2>${k}</h2></div>
            ${filtered.filter(i => (i.kingdom||'غير مصنف') === k).map(item => `
                <div class="card">
                    <h3>${item.name_ar}</h3>
                    <p><i>${item.scientific_name}</i></p>
                    <div class="status-badge" style="background:${getStatusColor(item.status)}">${item.status || 'غير محدد'}</div>
                </div>
            `).join('')}
        `).join('');
    }

    function getStatusColor(status) {
        if (status === 'محمي') return '#2e7d32';
        if (status === 'مهدد') return '#c62828';
        return '#f9a825';
    }

    async function handleBtnClick() {
        const { data: { session } } = await client.auth.getSession();
        if (!session) {
            const email = prompt("البريد:");
            const pass = prompt("كلمة المرور:");
            const { error } = await client.auth.signInWithPassword({ email, password: pass });
            if (error) alert(error.message); else alert("تم!");
        } else {
            document.getElementById('modal').style.display = 'block';
        }
    }

    async function addItem() {
        const data = {
            name_ar: document.getElementById('n_ar').value.trim(),
            scientific_name: document.getElementById('n_sci').value.trim(),
            kingdom: document.getElementById('kingdom').value,
            status: document.getElementById('status').value,
            image_url: document.getElementById('img').value,
            description: document.getElementById('desc').value
        };
        if (!data.name_ar || !data.scientific_name) return alert("الاسم مطلوب!");
        if (species.find(i => i.name_ar === data.name_ar)) return alert("موجود مسبقاً!");
        
        await client.from('species').insert([data]);
        location.reload();
    }
    init();
</script>
</body>
</html>
