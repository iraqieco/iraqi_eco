<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عراقي إيكو</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding-bottom: 50px; }
        header { background: #1b5e20; color: white; padding: 20px; text-align: center; }
        .container { padding: 20px; }
        .card { background: white; padding: 15px; margin: 10px; border-radius: 10px; width: 200px; display: inline-block; vertical-align: top; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; margin-bottom: 10px; display: block; }
        #modal { display: none; position: fixed; top: 10%; right: 10%; width: 80%; background: white; padding: 20px; border: 2px solid #1b5e20; z-index: 1000; }
        input, select { display: block; width: 90%; margin: 10px 0; padding: 10px; }
    </style>
</head>
<body>

<header>
    <h1>عراقي إيكو</h1>
</header>

<div class="container">
    <button onclick="document.getElementById('modal').style.display='block'">+ إضافة مخلوق</button>
    <div id="content"></div>
</div>

<div id="modal">
    <input id="n_ar" placeholder="الاسم العربي">
    <input id="n_sci" placeholder="الاسم العلمي">
    <input id="img" placeholder="رابط الصورة المباشر">
    <button onclick="saveItem()" style="background:#1b5e20; color:white; padding:10px; width:100%;">حفظ</button>
</div>

<script>
    const client = supabase.createClient('https://rmqtopxawrrgntcqqnpa.supabase.co', 'sb_publishable_M1Adw5Xf9Sq-aCSREHP6uQ_5Geps_QX');
    
    async function init() {
        const { data } = await client.from('species').select('*');
        let html = '';
        data.forEach(i => {
            html += `<div class="card">
                ${i.img ? `<img src="${i.img}" onerror="this.style.display='none'">` : ''}
                <h3>${i.name_ar}</h3>
                <p><i>${i.scientific_name}</i></p>
                <button onclick="deleteItem(${i.id})">حذف</button>
            </div>`;
        });
        document.getElementById('content').innerHTML = html;
    }

    async function saveItem() {
        const data = { 
            name_ar: document.getElementById('n_ar').value,
            scientific_name: document.getElementById('n_sci').value,
            img: document.getElementById('img').value
        };
        await client.from('species').insert([data]);
        location.reload();
    }

    async function deleteItem(id) {
        await client.from('species').delete().eq('id', id);
        location.reload();
    }

    init();
</script>
</body>
</html>
