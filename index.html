<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عراقي إيكو</title>
    <!-- استدعاء مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>قائمة الكائنات</h1>
    
    <!-- زر الإضافة -->
    <button id="add-btn" onclick="handleAuth()">إضافة مخلوق جديد</button>
    
    <!-- منطقة عرض البيانات -->
    <div id="output" style="margin-top:20px;">جاري تحميل البيانات...</div>

    <script>
        // إعداد العميل (تأكد من مطابقة هذه البيانات مع لوحة تحكم Supabase الخاصة بك)
        const supabaseUrl = 'https://rmqtopxawrrgntcqqnpa.supabase.co';
        const supabaseKey = 'sb_publishable_M1Adw5Xf9Sq-aCSREHP6uQ_5Geps_QX';
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        // دالة عرض البيانات
        async function loadData() {
            const { data, error } = await client.from('species').select('*');
            if (error) {
                document.getElementById('output').innerText = "خطأ في تحميل البيانات: " + error.message;
            } else {
                document.getElementById('output').innerHTML = data.map(item => `
                    <div style="border:1px solid #ccc; padding:10px; margin:5px;">
                        <h3>${item.name_ar}</h3>
                        <p>${item.scientific_name}</p>
                    </div>
                `).join('');
            }
        }

        // دالة الزر الذكية (تستخدم نظام البريد الإلكتروني المفعل في حسابك)
        async function handleAuth() {
            const { data: { session } } = await client.auth.getSession();
            
            if (session) {
                // إذا كان المستخدم مسجلاً، نطلب البيانات ونضيفها
                const nameAr = prompt("أدخل اسم المخلوق بالعربية:");
                const sciName = prompt("أدخل الاسم العلمي:");
                
                if (nameAr && sciName) {
                    const { error } = await client.from('species').insert([{ 
                        name_ar: nameAr, 
                        scientific_name: sciName 
                    }]);
                    
                    if (error) alert("خطأ في الإضافة (تأكد من تسجيل دخولك): " + error.message);
                    else {
                        alert("تمت الإضافة بنجاح!");
                        loadData(); 
                    }
                }
            } else {
                // إذا لم يكن مسجلاً، نرسل رابط سحري لبريده الإلكتروني
                const email = prompt("يرجى إدخال بريدك الإلكتروني لتسجيل الدخول:");
                if (email) {
                    const { error } = await client.auth.signInWithOtp({
                        email: email,
                        options: {
                            emailRedirectTo: 'https://iraqieco.github.io'
                        }
                    });
                    
                    if (error) alert("خطأ: " + error.message);
                    else alert("تم إرسال رابط الدخول إلى بريدك الإلكتروني. يرجى الضغط عليه والعودة للموقع للإضافة.");
                }
            }
        }

        // تشغيل التحميل عند فتح الصفحة
        loadData();
    </script>
</body>
</html>
