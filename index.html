<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عراقي إيكو - Iraqi Eco</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; line-height: 1.6; }
        .species-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 10px; background: #f9f9f9; }
        h2 { color: #2e7d32; margin-top: 0; }
        .error { color: red; }
    </style>
</head>
<body>

    <h1>قائمة الكائنات الحية - عراقي إيكو</h1>
    <div id="species-list">جاري تحميل البيانات...</div>

    <script>
        const SUPABASE_URL = 'https://rmqtopxawrrgntcqqnpa.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtcXRvcHhhd3JyZ250Y3FxbnBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3OTIxMzQsImV4cCI6MjA5ODM2ODEzNH0.HoExHY9oNFdryWUC2u2UELLPfBNhH3P4L3zS03dvELA';

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchSpecies() {
            const listDiv = document.getElementById('species-list');
            
            try {
                const { data, error } = await supabase
                    .from('species')
                    .select('*');

                if (error) throw error;

                if (!data || data.length === 0) {
                    listDiv.innerHTML = '<p>لا توجد بيانات حالياً في قاعدة البيانات.</p>';
                    return;
                }

                listDiv.innerHTML = ''; // تنظيف شاشة التحميل
                
                data.forEach(item => {
                    // ننشئ عناصر البطاقة فقط إذا كانت البيانات موجودة
                    let cardHTML = `<div class="species-card">`;
                    
                    if (item.name_ar) cardHTML += `<h2>${item.name_ar}</h2>`;
                    if (item.scientific_name) cardHTML += `<p><strong>الاسم العلمي:</strong> ${item.scientific_name}</p>`;
                    if (item.conservation_status) cardHTML += `<p><strong>حالة الحفظ:</strong> ${item.conservation_status}</p>`;
                    if (item.description) cardHTML += `<p>${item.description}</p>`;
                    
                    cardHTML += `</div>`;
                    listDiv.innerHTML += cardHTML;
                });
            } catch (err) {
                console.error("خطأ:", err);
                listDiv.innerHTML = `<p class="error">حدث خطأ أثناء جلب البيانات. تأكد من إعدادات السياسات (Policies) في Supabase.</p>`;
            }
        }

        fetchSpecies();
    </script>
</body>
</html>
