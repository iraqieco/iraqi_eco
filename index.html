<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عراقي إيكو</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .header { text-align: center; color: #2e7d32; }
        #searchBox { width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ddd; }
        #adminPanel { background: white; padding: 20px; border-radius: 15px; display: none; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; }
        .del-btn { background: #ff5252; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

    <h1 class="header">☘️ عراقي إيكو</h1>
    <input type="text" id="searchBox" placeholder="البحث..." oninput="filterCards()">
    <button onclick="checkPassAndOpen()">إضافة كائن جديد (+)</button>

    <div id="adminPanel">
        <span style="cursor:pointer; float:left; color:red;" onclick="this.parentElement.style.display='none'">✖</span>
        <input type="text" id="arName" placeholder="الاسم العربي">
        <input type="text" id="laName" placeholder="الاسم اللاتيني">
        <input type="text" id="imgUrl" placeholder="رابط الصورة">
        <select id="cat"><option value="ثدييات">ثدييات</option><option value="طيور">طيور</option></select>
        <button id="submitBtn" style="background:#2e7d32; color:white; width:100%; padding:10px; border:none; border-radius:8px; margin-top:10px;">نشر</button>
    </div>

    <div id="displayArea" class="grid"></div>

    <script>
        const URL = 'https://rmqtopxawrrgntcqqnpa.supabase.co/rest/v1/species';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtcXRvcHhhd3JyZ250Y3FxbnBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3OTIxMzQsImV4cCI6MjA5ODM2ODEzNH0.HoExHY9oNFdryWUC2u2UELLPfBNhH3P4L3zS03dvELA';
        const MY_PASS = '2i9#6'; // ضع كلمة مرورك هنا

        function checkPassAndOpen() {
            let pass = prompt("كلمة المرور :");
            if (pass === MY_PASS) document.getElementById('adminPanel').style.display = 'block';
            else alert("كلمة خاطئة!");
        }

        async function deleteItem(id) {
            let pass = prompt("أدخل كلمة المرور للحذف:");
            if (pass !== MY_PASS) return alert("كلمة خاطئة!");
            await fetch(URL + '?id=eq.' + id, { method: 'DELETE', headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY }});
            location.reload();
        }

        async function loadSpecies() {
            const res = await fetch(URL + '?select=*', { headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY }});
            const data = await res.json();
            document.getElementById('displayArea').innerHTML = data.map(item => `
                <div class="card" data-name="${item.arabic_name.toLowerCase()}">
                    <img src="${item.image_url || 'https://via.placeholder.com/150'}">
                    <h3>${item.arabic_name}</h3>
                    <p><em>${item.latin_name}</em></p>
                    <p style="color:#2e7d32; font-weight:bold;">${item.category}</p>
                    <button class="del-btn" onclick="deleteItem(${item.id})">حذف</button>
                </div>
            `).join('');
        }

        document.getElementById('submitBtn').addEventListener('click', async () => {
            await fetch(URL, { method: 'POST', headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json' },
                body: JSON.stringify({ arabic_name: document.getElementById('arName').value, latin_name: document.getElementById('laName').value, image_url: document.getElementById('imgUrl').value, category: document.getElementById('cat').value })
            });
            location.reload();
        });

        loadSpecies();

        function filterCards() {
            const query = document.getElementById('searchBox').value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                card.style.display = card.dataset.name.includes(query) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
