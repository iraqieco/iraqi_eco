<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - عراقي إيكو</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; }
    </style>
</head>
<body>

<div class="container" id="authDiv">
    <h3>تسجيل دخول الإدارة</h3>
    <input type="email" id="email" placeholder="البريد الإلكتروني">
    <input type="password" id="pass" placeholder="كلمة المرور">
    <button onclick="login()">دخول</button>
</div>

<div class="container" id="adminPanel" style="display:none;">
    <h3>إضافة كائن جديد</h3>
    <input type="text" id="arName" placeholder="الاسم العربي">
    <input type="text" id="laName" placeholder="الاسم اللاتيني">
    <input type="text" id="imgUrl" placeholder="رابط الصورة">
    <button onclick="addItem()">نشر في الموقع</button>
    <button onclick="logout()" style="background:red; color:white;">خروج</button>
</div>

<script>
    const supabase = supabase.createClient('rmqtopxawrrgntcqqnpa', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtcXRvcHhhd3JyZ250Y3FxbnBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3OTIxMzQsImV4cCI6MjA5ODM2ODEzNH0.HoExHY9oNFdryWUC2u2UELLPfBNhH3P4L3zS03dvELA');

    async function login() {
        const { error } = await supabase.auth.signInWithPassword({
            email: document.getElementById('email').value,
            password: document.getElementById('pass').value
        });
        if (error) alert(error.message);
        else location.reload();
    }

    // التحقق إذا كان المستخدم مسجلاً بالفعل
    supabase.auth.onAuthStateChange((event, session) => {
        if (session) {
            document.getElementById('authDiv').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
        }
    });

    async function addItem() {
        const { error } = await supabase.from('species').insert([{
            arabic_name: document.getElementById('arName').value,
            latin_name: document.getElementById('laName').value,
            image_url: document.getElementById('imgUrl').value
        }]);
        if (error) alert("خطأ: " + error.message);
        else alert("تم النشر بنجاح!");
    }

    async function logout() {
        await supabase.auth.signOut();
        location.reload();
    }
</script>
</body>
</html>
