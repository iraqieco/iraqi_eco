<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عراقي إيكو</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; }
        header { background: #1b5e20; color: white; padding: 20px; text-align: center; }
        .container { padding: 20px; }
        
        /* ترتيب الممالك من اليمين لليسار */
        .kingdom-container { margin-bottom: 40px; text-align: right; }
        .kingdom-title { background: #1b5e20; color: white; padding: 10px 20px; border-radius: 5px; margin-bottom: 15px; display: inline-block; }
        
        .card { border: 1px solid #ddd; padding: 15px; margin: 10px; border-radius: 10px; background: white; width: 250px; display: inline-block; vertical-align: top; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 15px; color: white; font-size: 0.75em; margin-top: 8px; font-weight: bold; }
        
        input, select { display: block; width: 90%; margin: 8px 0; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        #modal { display: none; position: fixed; top: 5%; right: 10%; width: 80%; background: white; padding: 20px; border: 3px solid #1b5e20; z-index: 100; border-radius: 10px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

<header>
    <h1>عراقي إيكو</h1>
</header>

<div class="container">
    <input type="text" id="search" style="width:100%; padding:12px; margin-bottom:20px;" placeholder="بحث بالاسم..." onkeyup="render()">
    <button onclick="handleBtnClick()" style="padding: 10px 20px; background: #1b5e20; color: white; border: none; border-radius: 5px; cursor:pointer;">+ إضافة مخلوق</button>
    <div id="content"></div>
</div>

<div id="modal">
    <button onclick="document.getElementById('modal').style.display='none'">✖ إغلاق</button>
    <h3>إضافة مخلوق جديد</h3>
    <input id="n_ar" placeholder="الاسم العربي (إجباري)">
    <input id="n_sci" placeholder="الاسم اللاتيني (إجباري)">
    <input id="kingdom" placeholder="المملكة">
    <input id="phylum" placeholder="الشعبة">
    <input id="family" placeholder="العائلة">
    <select id="conservation_status">
        <option value="">حالة الحفظ (اختر الحالة)</option>
        <option value="EX">منقرض (EX)</option>
        <option value="CR">خطر أقصى (CR)</option>
        <option value="EN">مهدد بالانقراض (EN)</option>
        <option value="VU">معرض للخطر (VU)</option>
        <option value="NT">قريب من التهديد (NT)</option>
        <option value="LC">غير مهدد (LC)</option>
    </select>
    <input id="img" placeholder="رابط الصورة">
    <input id="desc" placeholder="الوصف">
    <button onclick="addItem()" style="background:#1b5e20; color:white; padding:10px; width:100%; margin-top:10px;">حفظ المخلوق</button>
</div>

<script>
    const client = supabase.createClient('https://rmqtopxawrrgntcqqnpa.supabase.co', 'sb_publishable_M1Adw5Xf9Sq-aCSREHP6uQ_5Geps_QX');
    let species = [];

    async function init() {
        const { data } = await client.from('species').select('*');
        species = data || [];
        render();
    }

    // ألوان IUCN العالمية
    function getStatusColor(status) {
        const colors = {
            'EX': '#000000', // أسود
            'CR': '#d32f2f', // أحمر غامق
            'EN': '#f44336', // أحمر
            'VU': '#ff9800', // برتقالي
            'NT': '#ffc107', // أصفر
            'LC': '#4caf50'  // أخضر
        };
        return colors[status] || '#757575';
    }

    function render() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = species.filter(i => (i.name_ar||'').toLowerCase().includes(q) || (i.scientific_name||'').toLowerCase().includes(q));
        const kingdoms = [...new Set(filtered.map(i => i.kingdom || 'غير مصنف'))];
        
        document.getElementById('content').innerHTML = kingdoms.map(k => `
            <div class="kingdom-container">
                <div class="kingdom-title">${k}</div>
                <div>
                    ${filtered.filter(i => (i.kingdom||'غير مصنف') === k).map(item => `
                        <div class="card">
                            <h3>${item.name_ar}</h3>
                            <p><i>${item.scientific_name}</i></p>
                            <div class="status-badge" style="background:${getStatusColor(item.conservation_status)}">${item.conservation_status || 'غير محدد'}</div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    async function handleBtnClick() {
        const { data: { session } } = await client.auth.getSession();
        if (!session) {
            const email = prompt("البريد:");
            const pass = prompt("كلمة المرور:");
            const { error } = await client.auth.signInWithPassword({ email, password: pass });
            if (error) alert(error.message); else alert("تم تسجيل الدخول!");
        } else {
            document.getElementById('modal').style.display = 'block';
        }
    }

    async function addItem() {
        const data = {
            name_ar: document.getElementById('n_ar').value.trim(),
            scientific_name: document.getElementById('n_sci').value.trim(),
            kingdom: document.getElementById('kingdom').value.trim() || 'غير مصنف',
            phylum: document.getElementById('phylum').value.trim(),
            family: document.getElementById('family').value.trim(),
            conservation_status: document.getElementById('conservation_status').value,
            image_url: document.getElementById('img').value.trim(),
            description: document.getElementById('desc').value.trim()
        };

        if (!data.name_ar || !data.scientific_name) return alert("الاسم العربي واللاتيني إجباريان!");
        
        const { error } = await client.from('species').insert([data]);
        if (error) alert("خطأ: " + error.message);
        else { alert("تمت الإضافة!"); location.reload(); }
    }
    init();
</script>
</body>
</html>
