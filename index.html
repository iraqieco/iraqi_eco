<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عراقي إيكو</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>

    <header>
        <h1>عراقي إيكو</h1>
    </header>

    <section class="controls">
        <input type="text" id="search" placeholder="ابحث باسم الكائن...">
        <select id="kingdomFilter">
            <option value="">كل الممالك</option>
            <option value="الحيوانات">الحيوانات</option>
            <option value="النباتات">النباتات</option>
            <option value="الفطريات">الفطريات</option>
        </select>
    </section>

    <section class="stats">
        <div class="statBox"><h3>الكائنات</h3><p id="speciesCount">0</p></div>
        <div class="statBox"><h3>التصنيفات</h3><p id="categoriesCount">0</p></div>
    </section>

    <section class="actions">
        <button id="addBtn" style="display:none;">+ إضافة كائن</button>
    </section>

    <main id="grid" class="grid"></main>

    <!-- نافذة إضافة كائن -->
    <div id="addModal" class="modal">
        <div class="modalContent">
            <span id="closeModal">&times;</span>
            <h2>إضافة كائن جديد</h2>
            <input id="name_ar" placeholder="الاسم العربي">
            <input id="scientific_name" placeholder="الاسم العلمي">
            <select id="kingdom">
                <option value="الحيوانات">الحيوانات</option>
                <option value="النباتات">النباتات</option>
                <option value="الفطريات">الفطريات</option>
            </select>
            <select id="conservation_status">
                <option value="LC">غير مهدد</option>
                <option value="NT">قريب من التهديد</option>
                <option value="VU">معرض للخطر</option>
                <option value="EN">مهدد بالانقراض</option>
                <option value="CR">مهدد بخطر انقراض أقصى</option>
            </select>
            <textarea id="description" placeholder="الوصف"></textarea>
            <button id="saveSpecies">حفظ الكائن</button>
            <p id="result"></p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
