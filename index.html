    function updateCounts() {
        const select = document.getElementById('categorySelect');
        const allGroups = [...new Set(db.flatMap(item => item.group))].sort();
        
        select.innerHTML = `<option value="الكل">الكل (${db.length})</option>`;
        allGroups.forEach(cat => {
            let count = db.filter(item => item.group.includes(cat)).length;
            let option = document.createElement('option');
            option.value = cat;
            option.text = `${cat} (${count})`;
            select.appendChild(option);
        });
    }

    function updateView() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const cat = document.getElementById('categorySelect').value;
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = "";

        db.filter(item => 
            (cat === "الكل" || item.group.includes(cat)) && 
            (item.name.includes(query) || item.sci.toLowerCase().includes(query))
        ).forEach(item => {
            const tags = item.group.map(g => `<span class="group-tag">${g}</span>`).join('');
            resultsDiv.innerHTML += `
                <div class="card">
                    <img src="${item.img}" alt="${item.name}">
                    <h3>${item.name}</h3>
                    <p class="latin">${item.sci}</p>
                    <div>${tags}</div>
                    <p class="status ${item.class}">حالة الحفظ: ${item.status}</p>
                </div>
            `;
        });
    }

    updateCounts();
    updateView();
</script>
