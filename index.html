    <style>
        :root { --primary-color: #1b4332; --secondary-color: #2d6a4f; --accent-color: #d4a373; --bg-color: #f4f6f4; --card-bg: #ffffff; --text-color: #212529; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding-bottom: 60px; }
        header { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: white; text-align: center; padding: 50px 20px; border-bottom: 5px solid var(--accent-color); }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 15px; }
        .controls-section { background: var(--card-bg); padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .search-box input { width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 10px; margin-top: 10px; }
        .filter-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .filter-btn { background-color: #eaeaea; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .filter-btn.active { background-color: var(--secondary-color); color: white; }
        .species-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .species-card { background: var(--card-bg); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eef2fe; }
        .species-name { color: var(--primary-color); font-size: 1.3rem; }
        .scientific-name { font-style: italic; color: #666; margin-bottom: 10px; }
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 0.8rem; color: white; }
        .status-lc { background-color: #2b9348; }
        .status-en { background-color: #f57c00; }
        .status-unknown { background-color: #6c757d; }
    </style>
</head>

    const grid = document.getElementById('speciesGrid');
    const searchInput = document.getElementById('searchInput');

    function render(filter = 'all', search = '') {
        grid.innerHTML = '';
        let count = 0;
        animalsData.forEach(item => {
            if ((filter === 'all' || item.group === filter) && (item.name.includes(search) || item.sci.includes(search))) {
                grid.innerHTML += `<div class="species-card">
                    <h2 class="species-name">${item.name}</h2>
                    <p class="scientific-name">${item.sci}</p>
                    <span class="status-badge ${item.class}">${item.status}</span>
                </div>`;
                count++;
            }
        });
        document.getElementById('countVisible').textContent = count;
    }

    document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', (e) => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        render(e.target.dataset.filter, searchInput.value);
    }));

    searchInput.addEventListener('input', (e) => render(document.querySelector('.filter-btn.active').dataset.filter, e.target.value));
    render();
</script>
