<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>قاعدة بيانات الحياة البرية في العراق</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        input { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: right; }
        th { background: #333; color: white; }
        .status-lc { color: green; }
        .status-vu { color: orange; }
        .status-en { color: red; }
        .status-cr { color: darkred; }
        .status-ex { color: gray; }
    </style>
</head>
<body>

    <h2>قاعدة بيانات التنوع البيولوجي - العراق</h2>
    <input type="text" id="searchInput" placeholder="ابحث عن اسم الحيوان..." onkeyup="filterTable()">

    <table id="data-table">
        <thead>
            <tr>
                <th>الاسم</th>
                <th>الاسم العلمي</th>
                <th>المجموعة</th>
                <th>الحالة</th>
                <th>الوصف</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>

    <script>
        // قراءة الملف
        fetch('data1.json')
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('table-body');
                data.forEach(item => {
                    const row = `<tr>
                        <td>${item.name}</td>
                        <td><i>${item.sci}</i></td>
                        <td>${item.group.join(', ')}</td>
                        <td class="${item.class}">${item.status}</td>
                        <td>${item.desc}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            });

        // وظيفة البحث
        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('#table-body tr');
            rows.forEach(row => {
                const name = row.cells[0].textContent.toLowerCase();
                row.style.display = name.includes(query) ? "" : "none";
            });
        }
    </script>
</body>
</html>
