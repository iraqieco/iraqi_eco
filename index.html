<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عراقي إيكو</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; zoom: 1.5; }
        header { background: #1b5e20; color: white; padding: 20px; text-align: center; }
        .container { padding: 20px; }
        .kingdom-section { margin-bottom: 30px; }
        .kingdom-title { background: #1b5e20; color: white; padding: 5px 15px; border-radius: 5px; margin-bottom: 15px; display: inline-block; font-weight: bold; }
        .count-badge { background: #e8f5e9; color: #1b5e20; padding: 2px 8px; border-radius: 10px; font-size: 0.8em; margin-right: 10px; }
        .cards-wrapper { display: flex; flex-wrap: wrap; gap: 15px; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 10px; background: white; width: 220px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .menu-btn { position: absolute; top: 5px; left: 5px; cursor: pointer; font-size: 1.2em; }
        .menu-options { display: none; position: absolute; top: 25px; left: 5px; background: white; border: 1px solid #ccc; z-index: 100; padding: 5px; }
        .menu-options div { padding: 5px; cursor: pointer; font-size: 0.8em; }
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; color: white; font-size: 0.7em; margin-top: 5px; font-weight: bold; }
        input, select { display: block; width: 90%; margin: 8px 0; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        #modal { display: none; position: fixed; top: 5%; right: 10%; width: 80%; background: white; padding: 20px; border: 3px solid #1b5e20; z-index: 1000; border-radius: 10px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

<header>
    <h1>عراقي إيكو</h1>
    <p>قاعدة بيانات الكائنات الحية في العراق</p>
</header>

<div class="container">
    <input type="text" id="search" placeholder="بحث بالاسم العربي أو العلمي..." onkeyup="render()" style="width:100%; padding:10px;">
    <button onclick="openModal()" style="margin:15px 0; padding:10px; background:#1b5e20; color:white; border:none; border-radius:5px;">+ إضافة مخلوق</button>
    <div id="content"></div>
</div>

<div id="modal">
    <button onclick="document.getElementById('modal').style.display='none'" style="float:left;">✖</button>
    <h3 id="modalTitle">إضافة مخلوق</h3>
    <input type="hidden" id="editId">
    <input id="n_ar" placeholder="الاسم العربي (إجباري)" required>
    <input id="n_sci" placeholder="الاسم العلمي (إجباري)" required>
    
    <select id="kingdom">
        <option value="حيوانات">حيوانات</option>
        <option value="نباتات">نباتات</option>
        <option value="فطريات">فطريات</option>
        <option value="طلائعيات">طلائعيات</option>
        <option value="بدائيات">بدائيات</option>
    </select>

    <input id="phylum" placeholder="الشعبة (اختياري)">
    <input id="family" placeholder="العائلة (اختياري)">
    <select id="conservation_status">
        <option value="EX">منقرض (EX)</option>
        <option value="CR">خطر أقصى (CR)</option>
        <option value="EN">مهدد (EN)</option>
        <option value="VU">معرض للخطر (VU)</option>
        <option value="NT">قريب من التهديد (NT)</option>
        <option value="LC">غير مهدد (LC)</option>
    </select>
    <input id="img" placeholder="رابط الصورة (اختياري)">
    <input id="desc" placeholder="الوصف (اختياري)">
    <button onclick="saveItem()" style="background:#1b5e20; color:white; padding:10px; width:100%;">حفظ البيانات</button>
</div>

<script>
    const client = supabase.createClient('https://rmqtopxawrrgntcqqnpa.supabase.co', 'sb_publishable_M1Adw5Xf9Sq-aCSREHP6uQ_5Geps_QX');
    let species = [];
    
    const statusConfig = { 
        'EX': { color: '#000', text: 'منقرض' }, 
        'CR': { color: '#d32f2f', text: 'خطر أقصى' }, 
        'EN': { color: '#f44336', text: 'مهدد' }, 
        'VU': { color: '#ff9800', text: 'معرض للخطر' }, 
        'NT': { color: '#ffc107', text: 'قريب من التهديد' }, 
        'LC': { color: '#4caf50', text: 'غير مهدد' } 
    };

    async function init() {
        const { data } = await client.from('species').select('*');
        species = data || [];
        render();
    }

    function render() {
        const q = document.getElementById('search').value.toLowerCase();
        const kingdoms = ["حيوانات", "نباتات", "فطريات", "طلائعيات", "بدائيات"];
        
        document.getElementById('content').innerHTML = kingdoms.map(k => {
            const items = species.filter(i => 
                (i.kingdom || 'حيوانات') === k && 
                ((i.name_ar || '').toLowerCase().includes(q) || (i.scientific_name || '').toLowerCase().includes(q))
            );
            
            if (items.length === 0) return '';
            return `
                <div class="kingdom-section">
                    <div class="kingdom-title">${k} <span class="count-badge">${items.length}</span></div>
                    <div class="cards-wrapper">
                        ${items.map(item => `
                            <div class="card" id="card-${item.id}">
                                <div class="menu-btn" onclick="toggleMenu(${item.id})">⋮</div>
                                <div class="menu-options" id="menu-${item.id}">
                                    <div onclick="deleteItem(${item.id})">🗑 حذف</div>
                                    <div onclick="openModal(${item.id})">✏ تعديل</div>
                                    <div onclick="downloadCard('card-${item.id}')">⬇ تنزيل</div>
                                </div>
                                <h3>${item.name_ar}</h3>
                                <p><i>${item.scientific_name}</i></p>
                                <div class="status-badge" style="background:${statusConfig[item.conservation_status]?.color || '#757575'}">
                                    ${statusConfig[item.conservation_status]?.text || 'غير محدد'}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }).join('');
    }

    function toggleMenu(id) {
        const menu = document.getElementById('menu-'+id);
        menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
    }

    function openModal(id = null) {
        const modal = document.getElementById('modal');
        const item = species.find(i => i.id === id);
        document.getElementById('editId').value = id || '';
        document.getElementById('modalTitle').innerText = id ? "تعديل مخلوق" : "إضافة مخلوق";
        
        document.getElementById('n_ar').value = item ? item.name_ar : '';
        document.getElementById('n_sci').value = item ? item.scientific_name : '';
        document.getElementById('kingdom').value = item ? item.kingdom : 'حيوانات';
        document.getElementById('phylum').value = item ? item.phylum : '';
        document.getElementById('family').value = item ? item.family : '';
        document.getElementById('conservation_status').value = item ? item.conservation_status : 'LC';
        document.getElementById('img').value = item ? item.image_url : '';
        document.getElementById('desc').value = item ? item.description : '';
        
        modal.style.display = 'block';
    }

    async function saveItem() {
        const n_ar = document.getElementById('n_ar').value;
        const n_sci = document.getElementById('n_sci').value;

        if (!n_ar || !n_sci) {
            alert("الرجاء تعبئة الاسم العربي والاسم العلمي!");
            return;
        }

        const id = document.getElementById('editId').value;
        const data = {
            name_ar: n_ar,
            scientific_name: n_sci,
            kingdom: document.getElementById('kingdom').value,
            phylum: document.getElementById('phylum').value,
            family: document.getElementById('family').value,
            conservation_status: document.getElementById('conservation_status').value,
            image_url: document.getElementById('img').value,
            description: document.getElementById('desc').value
        };

        if (id) {
            await client.from('species').update(data).eq('id', id);
        } else {
            await client.from('species').insert([data]);
        }
        location.reload();
    }

    async function deleteItem(id) {
        if(confirm('هل أنت متأكد من الحذف؟')) {
            await client.from('species').delete().eq('id', id);
            location.reload();
        }
    }

    function downloadCard(id) {
        html2canvas(document.getElementById(id)).then(canvas => {
            const link = document.createElement('a');
            link.download = 'creature.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
    init();
</script>
</body>
</html>
