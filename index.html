<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عراقي إيكو</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 10px; background: white; margin-bottom: 20px; }
        .card img { width: 100%; max-height: 200px; object-fit: cover; border-radius: 5px; }
        input { display: block; width: 100%; margin: 10px 0; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <input type="text" id="n_ar" placeholder="الاسم العربي">
    <input type="text" id="n_sci" placeholder="الاسم العلمي">
    <input type="file" id="imgFile">
    <button onclick="saveItem()" style="padding:10px; background:green; color:white;">حفظ المخلوق</button>
    <div id="content"></div>
</div>

<script>
    const client = supabase.createClient('https://rmqtopxawrrgntcqqnpa.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtcXRvcHhhd3JyZ250Y3FxbnBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3OTIxMzQsImV4cCI6MjA5ODM2ODEzNH0.HoExHY9oNFdryWUC2u2UELLPfBNhH3P4L3zS03dvELA');

    async function init() {
        const { data } = await client.from('species').select('*');
        const content = document.getElementById('content');
        content.innerHTML = (data || []).map(item => `
            <div class="card">
                <img src="${item.image_url}" onerror="this.src='https://via.placeholder.com/150'">
                <h3>${item.name_ar}</h3>
                <p style="font-size:10px;">${item.image_url}</p>
            </div>
        `).join('');
    }

    async function saveItem() {
        const file = document.getElementById('imgFile').files[0];
        let publicUrl = "";
        
        if (file) {
            const fileName = `${Date.now()}.jpg`;
            const { error } = await client.storage.from('IraqiEco_img').upload(fileName, file);
            if (!error) {
                // الحصول على الرابط العام بشكل صحيح
                publicUrl = client.storage.from('IraqiEco_img').getPublicUrl(fileName).data.publicUrl;
            }
        }

        await client.from('species').insert([{
            name_ar: document.getElementById('n_ar').value,
            scientific_name: document.getElementById('n_sci').value,
            image_url: publicUrl
        }]);
        location.reload();
    }
    init();
</script>
</body>
</html>
