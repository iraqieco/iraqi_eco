<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - عراقي إيكو</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- منطقة تسجيل الدخول -->
    <div id="auth-section">
        <h3>تسجيل دخول المشرف</h3>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة السر">
        <button onclick="login()">دخول</button>
    </div>

    <!-- منطقة النشر (تظهر فقط بعد الدخول) -->
    <div id="publish-section" style="display:none;">
        <h3>إضافة كائن جديد</h3>
        <input type="text" id="name" placeholder="اسم الكائن">
        <button onclick="publish()">نشر</button>
        <button onclick="logout()">خروج</button>
    </div>

    <script>
        const supabase = window.supabase.createClient('https://rmqtopxawrrgntcqqnpa.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtcXRvcHhhd3JyZ250Y3FxbnBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3OTIxMzQsImV4cCI6MjA5ODM2ODEzNH0.HoExHY9oNFdryWUC2u2UELLPfBNhH3P4L3zS03dvELA');

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                alert("خطأ: " + error.message);
            } else {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('publish-section').style.display = 'block';
                alert("أهلاً بك يا مشرف");
            }
        }

        async function publish() {
            const { error } = await supabase.from('species').insert([{ name_ar: document.getElementById('name').value }]);
            error ? alert("خطأ: " + error.message) : alert("تم النشر بنجاح!");
        }

        async function logout() {
            await supabase.auth.signOut();
            location.reload();
        }
    </script>
</body>
</html>
