<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="google-site-verification" content="0jRTIrdsb7aj8SvFaH9WswrLn506cgoyudn40MhxDiE" />
    <meta charset="UTF-8">
    <title>عراقي إيكو | مشروع تطوعي يهدف لدراسة وحماية البيئة</title>
    <meta name="description" content="عراقي إيكو: مشروع تطوعي يهدف لدراسة وحماية التنوع الإحيائي والنظام البيئي في العراق.">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        header { background: #1b5e20; color: white; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        .container { padding: 10px; }
        .kingdom-section { margin-bottom: 30px; }
        .kingdom-title { background: #1b5e20; color: white; padding: 5px 15px; border-radius: 5px; margin-bottom: 15px; display: inline-block; font-weight: bold; }
        .count-badge { background: #e8f5e9; color: #1b5e20; padding: 2px 8px; border-radius: 10px; font-size: 0.8em; margin-right: 10px; }
        .cards-wrapper { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { border: 2px solid #1b5e20; padding: 15px; border-radius: 15px; background: white; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card-logo { color: #1b5e20; font-weight: bold; text-align: center; font-size: 0.6em; margin-bottom: 10px; }
        .card img { width: 100%; height: 140px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; display: block; }
        .common-name { font-size: 1.1em; font-weight: bold; text-align: center; color: #333; margin: 5px 0 0 0; }
        .latin-name { font-size: 0.8em; font-style: italic; color: #666; text-align: center; display: block; margin-bottom: 10px; }
        .kingdom-tag { font-size: 0.7em; background: #e8f5e9; color: #1b5e20; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-bottom: 5px; }
        .card-desc { font-size: 0.8em; color: #444; line-height: 1.4; margin-top: 5px; }
        .status-badge { display: block; padding: 6px; border-radius: 8px; color: white; text-align: center; font-weight: bold; font-size: 0.8em; margin-top: 10px; }
        #modal { display: none; position: fixed; top: 5%; right: 10%; width: 80%; background: white; padding: 25px; border: 3px solid #1b5e20; z-index: 1000; border-radius: 15px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

<header>
    <h1>عراقي إيكو</h1>
    <p>قاعدة بيانات الكائنات الحية في العراق</p>
</header>

<div class="container">
    <input type="text" id="search" placeholder="بحث بالاسم العربي أو العلمي..." onkeyup="render()" style="width:100%; padding:10px; box-sizing:border-box;">
    <button onclick="openModal()" style="margin:15px 0; padding:12px; width:100%; background:#1b5e20; color:white; border:none; border-radius:8px; cursor:pointer;">+ إضافة مخلوق</button>
    <div id="content"></div>
</div>

<div id="modal">
    <h3 id="modalTitle">إضافة/تعديل مخلوق</h3>
    <input type="hidden" id="editId">
    <input id="n_ar" placeholder="الاسم العربي" required>
    <input id="n_sci" placeholder="الاسم العلمي" required>
    <select id="kingdom"><option value="حيوانات">حيوانات</option><option value="نباتات">نباتات</option><option value="فطريات">فطريات</option></select>
    <input id="img" placeholder="رابط الصورة">
    <input id="desc" placeholder="الوصف">
    <select id="conservation_status">
        <option value="LC">غير مهدد</option><option value="NT">قريب من التهديد</option><option value="VU">معرض للخطر</option>
        <option value="EN">مهدد</option><option value="CR">خطر أقصى</option><option value="EX">منقرض</option>
    </select>
    <button id="saveBtn" onclick="saveItem()" style="background:#1b5e20; color:white; padding:12px; width:100%; border:none; border-radius:8px;">حفظ البيانات</button>
    <button onclick="document.getElementById('modal').style.display='none'" style="margin-top:10px; width:100%; padding:10px; border:1px solid #ccc; border-radius:8px;">إغلاق</button>
</div>

<script>
    const client = supabase.createClient('https://rmqtopxawrrgntcqqnpa.supabase.co', 'sb_publishable_M1Adw5Xf9Sq-aCSREHP6uQ_5Geps_QX');
    let species = [];
    
    async function init() {
        const { data } = await client.from('species').select('*');
        species = data || [];
        render();
    }

    function render() {
        const q = document.getElementById('search').value.toLowerCase();
        const kingdoms = ["حيوانات", "نباتات", "فطريات", "طلائعيات", "بدائيات"];
        
        document.getElementById('content').innerHTML = kingdoms.map(k => {
            const items = species.filter(i => (i.kingdom || 'حيوانات') === k && ((i.name_ar || '').toLowerCase().includes(q) || (i.scientific_name || '').toLowerCase().includes(q)));
            if (items.length === 0) return '';
            return `
                <div class="kingdom-section">
                    <div class="kingdom-title">${k} <span class="count-badge">${items.length}</span></div>
                    <div class="cards-wrapper">
                        ${items.map(item => `
                            <div class="card">
                                ${item.image_url ? `<img src="${item.image_url}" onerror="this.style.display='none'">` : ''}
                                <div class="common-name">${item.name_ar}</div>
                                <div class="latin-name">${item.scientific_name}</div>
                                <span class="kingdom-tag">${item.kingdom}</span>
                                <div class="card-desc">${item.description || ''}</div>
                                <div class="status-badge" style="background:#4caf50">${item.conservation_status || 'غير محدد'}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }).join('');
    }

    async function saveItem() {
        const saveBtn = document.getElementById('saveBtn');
        const n_ar = document.getElementById('n_ar').value;
        const n_sci = document.getElementById('n_sci').value;
        if (!n_ar || !n_sci) return alert("يرجى ملء الحقول المطلوبة");

        saveBtn.innerText = "جاري الحفظ...";
        saveBtn.disabled = true;

        const data = { 
            name_ar: n_ar, 
            scientific_name: n_sci, 
            description: document.getElementById('desc').value,
            image_url: document.getElementById('img').value,
            kingdom: document.getElementById('kingdom').value, 
            conservation_status: document.getElementById('conservation_status').value 
        };
        
        const id = document.getElementById('editId').value;
        const { error } = id ? await client.from('species').update(data).eq('id', id) : await client.from('species').insert([data]);
        
        if (error) {
            alert("خطأ: " + error.message);
            saveBtn.innerText = "حفظ البيانات";
            saveBtn.disabled = false;
        } else {
            alert("تم الحفظ بنجاح!");
            location.reload();
        }
    }

    function openModal(id = null) {
        document.getElementById('modal').style.display = 'block';
        const item = species.find(i => i.id === id);
        document.getElementById('editId').value = id || '';
        document.getElementById('n_ar').value = item ? item.name_ar : '';
        document.getElementById('n_sci').value = item ? item.scientific_name : '';
    }

    init();
</script>
</body>
</html>
