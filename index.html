<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عراقي إيكو - لوحة التحكم</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>قائمة الكائنات</h1>
    
    <!-- واجهة تسجيل الدخول -->
    <div id="auth-box">
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="login()">تسجيل دخول</button>
    </div>

    <!-- منطقة عرض البيانات مع أزرار التحكم -->
    <div id="output" style="margin-top:20px;"></div>

    <script>
        const supabaseUrl = 'https://rmqtopxawrrgntcqqnpa.supabase.co';
        const supabaseKey = 'sb_publishable_M1Adw5Xf9Sq-aCSREHP6uQ_5Geps_QX';
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await client.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
            else { alert("تم تسجيل الدخول!"); loadData(); }
        }

        async function loadData() {
            const { data } = await client.from('species').select('*');
            document.getElementById('output').innerHTML = data.map(item => `
                <div style="border:1px solid #ccc; padding:10px; margin:5px;">
                    <h3>${item.name_ar}</h3>
                    <button onclick="deleteItem(${item.id})">حذف</button>
                </div>
            `).join('');
        }

        async function deleteItem(id) {
            const { error } = await client.from('species').delete().eq('id', id);
            if (error) alert(error.message);
            else loadData();
        }

        loadData();
    </script>
</body>
</html>
