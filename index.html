<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عراقي إيكو - لوحة الإضافة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .form-box { border: 2px solid #2e7d32; padding: 15px; margin-bottom: 20px; border-radius: 10px; }
        input, textarea { display: block; width: 100%; margin: 10px 0; padding: 8px; }
    </style>
</head>
<body>

    <div class="form-box">
        <h3>إضافة كائن جديد:</h3>
        <input type="text" id="name" placeholder="اسم الحيوان">
        <input type="text" id="scientific" placeholder="الاسم العلمي">
        <textarea id="desc" placeholder="الوصف"></textarea>
        <button onclick="addSpecies()">إضافة إلى الموقع</button>
    </div>

    <h1>قائمة الكائنات</h1>
    <div id="list">جاري التحميل...</div>

    <script>
        const URL = 'https://rmqtopxawrrgntcqqnpa.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtcXRvcHhhd3JyZ250Y3FxbnBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3OTIxMzQsImV4cCI6MjA5ODM2ODEzNH0.HoExHY9oNFdryWUC2u2UELLPfBNhH3P4L3zS03dvELA';
        const supabase = window.supabase.createClient(URL, KEY);

        async function addSpecies() {
            const name = document.getElementById('name').value;
            const scientific = document.getElementById('scientific').value;
            const desc = document.getElementById('desc').value;

            const { error } = await supabase.from('species').insert([{ 
                name_ar: name, 
                scientific_name: scientific, 
                description: desc 
            }]);

            if (error) {
                alert("خطأ: " + error.message);
            } else {
                alert("تمت الإضافة بنجاح!");
                location.reload(); // تحديث الصفحة لرؤية الإضافة
            }
        }
        // دالة العرض (نفس السابقة)
        // ... (يمكنك وضع دالة الـ fetch السابقة هنا)
    </script>
</body>
</html>
