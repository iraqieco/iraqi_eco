<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عراقي إيكو</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; zoom: 1.2; }
        .card { background: white; padding: 15px; margin: 10px; border-radius: 10px; width: 200px; display: inline-block; vertical-align: top; }
        img { width: 100%; height: 120px; object-fit: cover; border-radius: 5px; }
        input, select { display: block; width: 100%; margin: 10px 0; padding: 8px; }
        #modal { display: none; position: fixed; top: 10%; right: 10%; width: 80%; background: white; padding: 20px; border: 2px solid #1b5e20; z-index: 1000; }
    </style>
</head>
<body>

<button onclick="openModal()">+ إضافة مخلوق</button>
<div id="content"></div>

<div id="modal">
    <input id="editId" type="hidden">
    <input id="n_ar" placeholder="الاسم العربي">
    <input id="n_sci" placeholder="الاسم العلمي">
    <input id="img" placeholder="رابط الصورة المباشر">
    <input id="desc" placeholder="الوصف">
    <select id="kingdom">
        <option value="حيوانات">حيوانات</option><option value="نباتات">نباتات</option>
    </select>
    <button onclick="saveItem()" style="background:#1b5e20; color:white;">حفظ</button>
    <button onclick="document.getElementById('modal').style.display='none'">إغلاق</button>
</div>

<script>
    const client = supabase.createClient('https://rmqtopxawrrgntcqqnpa.supabase.co', 'sb_publishable_M1Adw5Xf9Sq-aCSREHP6uQ_5Geps_QX');
    
    async function init() {
        const { data } = await client.from('species').select('*');
        let html = '';
        data.forEach(i => {
            html += `<div class="card">
                ${i.img ? `<img src="${i.img}" onerror="this.style.display='none'">` : ''}
                <h3>${i.name_ar}</h3>
                <p>${i.scientific_name}</p>
                <button onclick="deleteItem(${i.id})">حذف</button>
            </div>`;
        });
        document.getElementById('content').innerHTML = html;
    }

    function openModal(id = null) {
        document.getElementById('modal').style.display = 'block';
    }

    async function saveItem() {
        const data = { 
            name_ar: document.getElementById('n_ar').value,
            scientific_name: document.getElementById('n_sci').value,
            img: document.getElementById('img').value,
            description: document.getElementById('desc').value,
            kingdom: document.getElementById('kingdom').value
        };
        await client.from('species').insert([data]);
        location.reload();
    }

    async function deleteItem(id) {
        await client.from('species').delete().eq('id', id);
        location.reload();
    }

    init();
</script>
</body>
</html>
