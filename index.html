<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عراقي إيكو | قاعدة بيانات المخلوقات الحية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; background: #f9f9f9; text-align: center; }
        header { margin-bottom: 30px; }
        h1 { color: #1b5e20; margin: 0; }
        
        #searchInput, #groupFilter { width: 80%; padding: 12px; margin-bottom: 15px; border: 2px solid #1b5e20; border-radius: 8px; box-sizing: border-box; }
        
        #card-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { border: 2px solid #1b5e20; border-radius: 15px; padding: 15px; background: white; text-align: center; display: flex; flex-direction: column; align-items: center; position: relative; }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; background: #eee; margin-bottom: 10px; }
        
        .card h3 { margin: 10px 0 2px; }
        .card .sci { font-size: 70%; color: #666; font-style: italic; margin-bottom: 8px; }
        
        .card .status { 
            font-weight: bold; padding: 8px; border-radius: 8px; margin: 10px 0; width: 100%; 
            text-align: center; border: 1px solid currentColor; background-color: #f0f0f0;
        }
        
        .status-lc { color: #2e7d32; } 
        .status-nt { color: #827717; } 
        .status-vu { color: #ef6c00; } 
        .status-en { color: #d84315; } 
        .status-cr { color: #c62828; } 
        .status-ex { color: #424242; } 

        .card .desc { font-size: 0.9em; height: 50px; overflow: hidden; margin-bottom: 15px; color: #333; }
        .btn-download { background: #1b5e20; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; width: 50%; margin-bottom: 10px; }
        .card-footer-logo { font-size: 0.7em; color: #1b5e20; font-weight: bold; margin-top: 5px; border-top: 1px solid #ddd; padding-top: 5px; width: 100%; }
    </style>
</head>
<body>

    <header>
        <h1>عراقي إيكو</h1>
        <p>قاعدة بيانات المخلوقات الحية في العراق</p>
    </header>

    <input type="text" id="searchInput" placeholder="إبحث بالإسم العربي أو اللاتيني..." onkeyup="filterCards()">
    
    <select id="groupFilter" onchange="filterCards()">
        <option value="الكل">أختر الفئة (الكل)</option>
    </select>

    <div id="card-container"></div>

    <script>
        const statusMap = {
            "LC": "غير مهدد", "NT": "قريب من التهديد", "VU": "عرضة للانقراض",
            "EN": "مهدد بالانقراض", "CR": "مهدد بشدة بالانقراض", "EX": "منقرض"
        };

        let creaturesData = [];

        fetch('data1.json')
            .then(response => response.json())
            .then(data => {
                creaturesData = data;
                renderCards(data);
                updateGroupDropdown(data);
            });

        function renderCards(data) {
            const container = document.getElementById('card-container');
            container.innerHTML = '';
            data.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.id = 'card-' + index;
                card.innerHTML = `
                    <img src="${item.img}" onerror="this.style.display='none'">
                    <h3>${item.name}</h3>
                    <div class="sci">${item.sci}</div>
                    <div class="status ${item.class}">${statusMap[item.status] || item.status}</div>
                    <div class="desc">${item.desc}</div>
                    <button class="btn-download" onclick="downloadCard('card-${index}')">تنزيل البطاقة</button>
                    <div class="card-footer-logo">عراقي إيكو</div>
                `;
                container.appendChild(card);
            });
        }

        function updateGroupDropdown(data) {
            const select = document.getElementById('groupFilter');
            const groups = {};

            data.forEach(item => {
                item.group.forEach(g => {
                    groups[g] = (groups[g] || 0) + 1;
                });
            });

            for (const [group, count] of Object.entries(groups)) {
                const option = document.createElement('option');
                option.value = group;
                option.textContent = `${group} (${count})`;
                select.appendChild(option);
            }
        }

        function filterCards() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const groupQuery = document.getElementById('groupFilter').value;

            document.querySelectorAll('.card').forEach((card, index) => {
                const item = creaturesData[index];
                const name = item.name.toLowerCase();
                const sci = item.sci.toLowerCase();
                
                const matchText = (name.includes(query) || sci.includes(query));
                const matchGroup = (groupQuery === "الكل" || item.group.includes(groupQuery));

                card.style.display = (matchText && matchGroup) ? "" : "none";
            });
        }

        async function downloadCard(id) {
            const cardElement = document.getElementById(id);
            html2canvas(cardElement, {
                useCORS: true,
                allowTaint: true,
                logging: false,
                backgroundColor: "#ffffff",
                scale: 2
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'بطاقة_عراقي_إيكو.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(err => {
                console.error("خطأ:", err);
                alert("تعذر التنزيل تلقائياً، يرجى التأكد من أنك تستخدم المتصفح عبر خادم (Local Server).");
            });
        }
    </script>
</body>
</html>
