<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>عراقي إيكو</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
</head>

<body>

<header class="hero">

<div class="overlay">

<h1>عراقي إيكو</h1>

<p>
اكتشف الحيوانات والنباتات والفطريات والكائنات الحية في العراق
</p>

</div>

</header>

<section class="searchSection">

<input
type="text"
id="search"
placeholder="ابحث باسم الكائن...">

<select id="kingdomFilter">

<option value="">كل الممالك</option>

<option value="الحيوانات">الحيوانات</option>

<option value="النباتات">النباتات</option>

<option value="الفطريات">الفطريات</option>

<option value="الطلائعيات">الطلائعيات</option>

<option value="البدائيات">البدائيات</option>

</select>

</section>

<section class="stats">

<div class="statBox">

<h2 id="speciesCount">0</h2>

<p>الكائنات</p>

</div>

<div class="statBox">

<h2 id="categoriesCount">0</h2>

<p>التصنيفات</p>

</div>

<div class="statBox">

<h2>Iraq</h2>

<p>الموقع</p>

</div>

</section>

<section class="toolbar">

<button
id="addBtn"
style="display:none">

+ إضافة كائن

</button>

</section>

<main>

<div id="grid" class="grid"></div>

</main>

<!-- نافذة الإضافة -->

<div id="addModal" class="modal">

<div class="modalContent">

<span id="closeModal" class="close">&times;</span>

<h2>إضافة كائن جديد</h2>

<input id="name_ar" placeholder="الاسم العربي">

<input id="scientific_name" placeholder="الاسم العلمي">

<select id="kingdom">

<option value="">المملكة</option>

<option>الحيوانات</option>

<option>النباتات</option>

<option>الفطريات</option>

<option>الطلائعيات</option>

<option>البدائيات</option>

</select>

<input id="phylum" placeholder="الشعبة">

<input id="class" placeholder="الصف">

<input id="order_name" placeholder="الرتبة">

<input id="family" placeholder="الفصيلة">

<input id="genus" placeholder="الجنس">

<input id="species_type" placeholder="النوع">

<select id="conservation_status">

<option value="">حالة الحفظ</option>

<option value="LC">LC</option>

<option value="NT">NT</option>

<option value="VU">VU</option>

<option value="EN">EN</option>

<option value="CR">CR</option>

<option value="EW">EW</option>

<option value="EX">EX</option>

<option value="DD">DD</option>

<option value="NE">NE</option>

</select>

<textarea
id="description"
rows="5"
placeholder="الوصف"></textarea>

<button id="saveSpecies">

حفظ الكائن

</button>

<p id="result"></p>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<div id="cardMenu" class="cardMenu" style="display:none;position:absolute;z-index:9999;background:#fff;border:1px solid #ddd;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,.2);overflow:hidden;min-width:170px;">

    <button id="editBtn" style="width:100%;padding:12px;border:none;background:#fff;cursor:pointer;">
        ✏️ تعديل
    </button>

    <button id="deleteBtn" style="width:100%;padding:12px;border:none;background:#fff;cursor:pointer;">
        🗑 حذف
    </button>

    <button id="downloadBtn" style="width:100%;padding:12px;border:none;background:#fff;cursor:pointer;">
        ⬇ تنزيل البطاقة
    </button>

                    </div>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</body>
</html>
