<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول | Iraqi Eco</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>

</head>
<body>

<div class="container" style="max-width:500px;margin:60px auto;">

<h2 style="text-align:center;">تسجيل الدخول</h2>

<input
id="email"
type="email"
placeholder="البريد الإلكتروني"
style="width:100%;padding:12px;margin:10px 0;"
>

<input
id="password"
type="password"
placeholder="كلمة المرور"
style="width:100%;padding:12px;margin:10px 0;"
>

<button id="loginBtn" style="width:100%;padding:12px;">
دخول
</button>

<p id="msg" style="margin-top:15px;text-align:center;"></p>

</div>

<script>

document.getElementById("loginBtn").onclick = async () => {

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value;
const msg = document.getElementById("msg");

msg.innerHTML = "جاري تسجيل الدخول...";

try {

if (!supabase || !supabase.auth) {
    alert("Supabase Auth غير موجود");
    return;
}

const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
});

if (error) {
    alert(error.message);
    msg.innerHTML = error.message;
    return;
}

alert("تم تسجيل الدخول بنجاح");
window.location.href = "add.html";

} catch (e) {

alert(e.message);
msg.innerHTML = e.message;

}

};

</script>

</body>
</html>
