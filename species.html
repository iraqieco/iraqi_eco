<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>عراقي إيكو</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/config.js"></script>

</head>

<body>

<header class="header">

<div class="container">

<a href="index.html" class="logo">

<img src="assets/logo.svg">

<div>

<h1>عراقي إيكو</h1>

<span>IraqiEco</span>

</div>

</a>

</div>

</header>

<section class="container" style="padding:40px 0;">

<div id="details"></div>

</section>

<script>

const id=new URLSearchParams(location.search).get("id");

async function load(){

const {data, error}=await supabaseClient

.from("species")

.select("*")

.eq("id",id)

.single();

const d=document.getElementById("details");

if(!data){

d.innerHTML="<h2>الكائن غير موجود</h2>";

return;

}

const val=v=>(v&&String(v).trim()!=="")?v.trim():"غير محدد";

const img=val(data.image_url)==="غير محدد"?"assets/no-image.svg":data.image_url.trim();

d.innerHTML=`

<div class="card">

<img src="${img}" style="width:100%;max-height:450px;object-fit:cover;border-radius:15px;">

<h2 style="margin-top:20px;">${val(data.name_ar)}</h2>

<p><b>الاسم العلمي:</b> ${val(data.scientific_name)}</p>

<p><b>الوصف:</b> ${val(data.description)}</p>

<p><b>حالة الحفظ:</b> ${val(data.conservation_status)}</p>

<p><b>المملكة:</b> ${val(data.kingdom)}</p>

<p><b>الشعبة:</b> ${val(data.phylum)}</p>

<p><b>الصف:</b> ${val(data.class)}</p>

<p><b>الرتبة:</b> ${val(data.order_name)}</p>

<p><b>الفصيلة:</b> ${val(data.family)}</p>

</div>

`;

}

load();

</script>

</body>

</html>
