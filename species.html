<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>عراقي إيكو</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/config.js"></script>

</head>

<body>

<header class="topBar">
    <a href="index.html" class="backBtn">← رجوع</a>
</header>

<main id="speciesPage">

    <div class="imageBox">
        <img id="speciesImage" src="assets/no-image.svg" alt="">
    </div>

    <div class="infoCard">

        <h1 id="nameAr"></h1>

        <h2 id="nameScientific"></h2>

        <span id="statusBadge" class="statusBadge"></span>

    </div>

    <div class="descriptionCard">

        <h3>الوصف</h3>

        <p id="description"></p>

    </div>

    <div class="taxonomyCard">

        <h3>التصنيف العلمي</h3>

        <table>

            <tr>
                <td>المملكة</td>
                <td id="kingdom"></td>
            </tr>

            <tr>
                <td>الشعبة</td>
                <td id="phylum"></td>
            </tr>

            <tr>
                <td>الصف</td>
                <td id="class"></td>
            </tr>

            <tr>
                <td>الرتبة</td>
                <td id="order"></td>
            </tr>

            <tr>
                <td>الفصيلة</td>
                <td id="family"></td>
            </tr>

            <tr>
                <td>الجنس</td>
                <td id="genus"></td>
            </tr>

        </table>

    </div>

</main>

<script src="js/config.js"></script>
<script src="js/species.js"></script>

</body>

</html>
